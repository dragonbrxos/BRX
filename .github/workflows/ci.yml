name: KanelOS CI

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Verificação semanal de compatibilidade
    - cron: '0 6 * * 1'

env:
  KERNEL_VERSION: "6.12.22"
  KANELOS_VERSION: "0.1.0"

jobs:
  # =========================================================================
  # Verificação de código e patches
  # =========================================================================
  lint-and-validate:
    name: Lint e Validação
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar scripts shell
        run: |
          sudo apt-get install -y shellcheck
          find . -name "*.sh" -exec shellcheck {} \;

      - name: Verificar patches
        run: |
          for patch in kernel/patches/*.patch; do
            echo "Verificando: $patch"
            # Verificar formato do patch
            grep -q "^From:" "$patch" || echo "WARN: $patch sem cabeçalho From:"
            grep -q "^Subject:" "$patch" || echo "WARN: $patch sem Subject"
          done

      - name: Verificar configurações do kernel
        run: |
          for config in kernel/configs/*.config; do
            echo "Verificando: $config"
            # Verificar se CONFIG_LOCALVERSION está definido
            grep -q "CONFIG_LOCALVERSION=" "$config" || \
              echo "WARN: $config sem CONFIG_LOCALVERSION"
          done

  # =========================================================================
  # Compilação do kernel (perfil desktop)
  # =========================================================================
  build-kernel-desktop:
    name: Build Kernel (Desktop)
    runs-on: ubuntu-22.04
    needs: lint-and-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential libncurses-dev bison flex \
            libssl-dev libelf-dev bc git fakeroot \
            cpio kmod xz-utils wget dwarves zstd

      - name: Cache do kernel source
        uses: actions/cache@v4
        with:
          path: build/linux-${{ env.KERNEL_VERSION }}
          key: kernel-src-${{ env.KERNEL_VERSION }}

      - name: Baixar kernel
        run: make download-kernel KERNEL_VERSION=${{ env.KERNEL_VERSION }}

      - name: Aplicar patches
        run: make apply-patches

      - name: Configurar kernel (desktop)
        run: make configure-kernel PROFILE=desktop

      - name: Compilar kernel
        run: |
          make build-kernel PROFILE=desktop JOBS=$(nproc)
        timeout-minutes: 120

      - name: Verificar artefatos
        run: |
          ls -la build/kernel-desktop/arch/x86/boot/bzImage || \
            echo "WARN: bzImage não encontrado"

      - name: Upload artefatos
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: kanelos-kernel-desktop-${{ env.KANELOS_VERSION }}
          path: |
            build/kernel-desktop/arch/x86/boot/bzImage
            build/kernel-desktop/.config
          retention-days: 7

  # =========================================================================
  # Compilação do kernel (perfil servidor)
  # =========================================================================
  build-kernel-server:
    name: Build Kernel (Server)
    runs-on: ubuntu-22.04
    needs: lint-and-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential libncurses-dev bison flex \
            libssl-dev libelf-dev bc git fakeroot \
            cpio kmod xz-utils wget dwarves zstd

      - name: Cache do kernel source
        uses: actions/cache@v4
        with:
          path: build/linux-${{ env.KERNEL_VERSION }}
          key: kernel-src-${{ env.KERNEL_VERSION }}

      - name: Baixar kernel
        run: make download-kernel KERNEL_VERSION=${{ env.KERNEL_VERSION }}

      - name: Aplicar patches
        run: make apply-patches

      - name: Configurar e compilar (server)
        run: |
          make configure-kernel PROFILE=server
          make build-kernel PROFILE=server JOBS=$(nproc)
        timeout-minutes: 120

  # =========================================================================
  # Teste de compatibilidade de patches
  # =========================================================================
  test-patches:
    name: Teste de Patches
    runs-on: ubuntu-22.04
    needs: lint-and-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential git wget xz-utils

      - name: Cache do kernel source
        uses: actions/cache@v4
        with:
          path: build/linux-${{ env.KERNEL_VERSION }}
          key: kernel-src-${{ env.KERNEL_VERSION }}

      - name: Baixar kernel
        run: make download-kernel KERNEL_VERSION=${{ env.KERNEL_VERSION }}

      - name: Testar aplicação de patches
        run: |
          make apply-patches
          echo "Patches aplicados com sucesso"

  # =========================================================================
  # Compilar ferramentas do KanelOS
  # =========================================================================
  build-tools:
    name: Build Ferramentas
    runs-on: ubuntu-22.04
    needs: lint-and-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential

      - name: Compilar kanel-ai-daemon
        run: |
          gcc -O2 -Wall -Wextra -pthread -lm \
            -o build/kanel-ai-daemon \
            ai-engine/daemon/kanel-ai-daemon.c \
            || echo "WARN: Compilação do daemon falhou (dependências)"

      - name: Verificar código C
        run: |
          # Verificar com cppcheck se disponível
          if command -v cppcheck &>/dev/null; then
            cppcheck --enable=all --suppress=missingInclude \
              ai-engine/daemon/kanel-ai-daemon.c \
              hal/src/kanel-hal-core.c
          fi

  # =========================================================================
  # Verificação de documentação
  # =========================================================================
  check-docs:
    name: Verificar Documentação
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar arquivos de documentação
        run: |
          required_docs=(
            "README.md"
            "docs/architecture/technical-base.md"
            "CHANGELOG.md"
            "LICENSE"
          )
          for doc in "${required_docs[@]}"; do
            if [ ! -f "$doc" ]; then
              echo "ERRO: Documentação faltando: $doc"
              exit 1
            fi
            echo "OK: $doc"
          done

      - name: Verificar links no README
        run: |
          # Verificar se arquivos referenciados no README existem
          grep -oP '\[.*?\]\((?!http).*?\)' README.md | \
            grep -oP '(?<=\().*(?=\))' | \
            while read -r link; do
              if [ ! -f "$link" ] && [ ! -d "$link" ]; then
                echo "WARN: Link quebrado: $link"
              fi
            done
