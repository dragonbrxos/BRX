--- # Calamares configuration for DragonBRX OS

# Branding
branding: "DragonBRX"

# Welcome page
welcome:
    - module: welcome
      options:
          welcome: "Bem-vindo ao DragonBRX OS!"
          start_button: "Iniciar Instalação"

# Locale selection
locale:
    - module: locale

# Keyboard layout selection
keyboard:
    - module: keyboard

# Partitioning module
partition:
    - module: partition
      options:
          defaultFileSystem: "btrfs"
          defaultMountPoint: "/"
          enableLuks: true
          enableSwap: true
          allowManualPartitioning: true
          allowDualBoot: true
          defaultPartitionTable: "gpt"

# User creation
users:
    - module: users
      options:
          allowRootLogin: false
          allowAutoLogin: false

# Summary page
summary:
    - module: summary

# Installation process (shellprocess module will call apex-install.sh)
install:
    - module: shellprocess
      options:
          script: "/opt/dragonbrx/scripts/install/apex-install.sh"
          timeout: 3600 # 1 hour timeout for installation

# Bootloader installation
bootloader:
    - module: bootloader
      options:
          efi: true
          grub: true
          bootloaderId: "DragonBRX"

# Finished page
finished:
    - module: finished
      options:
          restart_button: "Reiniciar Agora"
          shutdown_button: "Desligar"
