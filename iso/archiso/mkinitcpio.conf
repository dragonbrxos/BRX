# mkinitcpio.conf for DragonBRX OS Live/Install ISO

# MODULES
# The following modules are loaded before any boot hooks are
# run.  Advanced users may wish to specify all system modules
# in order to reduce the size of the RAM image. By default,
# the following modules are loaded for a safe fallback.
MODULES=("ext4" "btrfs" "vfat" "ntfs" "usb_storage" "sd_mod" "ahci" "nvme" "xhci_hcd" "i915" "amdgpu" "nouveau" "iwlwifi" "rtl8821ae" "broadcom")

# BINARIES
# This setting includes any absolute path to the binaries you wish to include.
BINARIES=("fsck" "fsck.ext4" "fsck.btrfs" "mkfs.ext4" "mkfs.btrfs" "mkfs.vfat" "mount" "umount" "parted" "fdisk" "gdisk" "wipefs" "lsblk" "ip" "iw" "wpa_supplicant" "dhcpcd" "NetworkManager" "git" "curl" "wget")

# FILES
# This setting includes any absolute path to the files you wish to include.
FILES=("/etc/iwd/main.conf" "/etc/NetworkManager/NetworkManager.conf")

# HOOKS
# This is the most important setting in this file.  The hooks control the
# modules and scripts added to the image, and the order they are added in.
# You are encouraged to examine the content of the default hooks in
# /usr/lib/mkinitcpio/hooks/ and create your own custom ones.
HOOKS=("base" "udev" "autodetect" "modconf" "block" "keyboard" "keymap" "consolefont" "encrypt" "lvm2" "filesystems" "fsck" "netconf" "net-online" "plymouth" "shutdown")

# COMPRESSION
# Use 'cat' to disable compression. Use 'gzip' or 'lzma' for compression.
COMPRESSION="lz4"

# COMPRESSION_OPTIONS
# Pass any arguments to the compression program here.
# COMPRESSION_OPTIONS="-9"
