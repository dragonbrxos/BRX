# =============================================================================
# KanelOS — Configurações sysctl Otimizadas
# Arquivo: /etc/sysctl.d/99-kanelos.conf
# =============================================================================
# Baseado em:
# - Benchmarks Phoronix Test Suite
# - Guias de tuning Cloudflare, Netflix, Google
# - Documentação oficial do kernel Linux
# - Configurações do CachyOS e Arch Linux
# =============================================================================

# --- Gerenciamento de Memória ---

# Swappiness: quanto o kernel prefere swap vs. liberar cache
# 10 = preferir RAM, usar swap apenas quando necessário
# (padrão Linux: 60)
vm.swappiness = 10

# Pressão de cache VFS: quanto o kernel recupera inodes/dentries do cache
# 50 = mais conservador que o padrão (100)
vm.vfs_cache_pressure = 50

# Dirty ratio: % de RAM que pode estar "suja" antes de forçar write-back
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5

# Dirty expire: tempo em ms antes de páginas sujas serem escritas
vm.dirty_expire_centisecs = 3000
vm.dirty_writeback_centisecs = 1500

# Overcommit: permitir overcommit de memória (necessário para muitas apps)
vm.overcommit_memory = 1
vm.overcommit_ratio = 50

# Huge pages: mínimo de huge pages livres
vm.min_free_kbytes = 65536

# MGLRU: habilitar Multi-Generational LRU (Linux 6.1+)
vm.lru_gen.enabled = 7
vm.lru_gen.min_ttl_ms = 0

# Zswap: habilitar compressão de swap em RAM
# (configurado via kernel config, mas pode ser ajustado aqui)
# zswap.enabled = 1
# zswap.compressor = zstd
# zswap.max_pool_percent = 20

# --- Scheduler ---

# Autogroup: agrupar processos por sessão para melhor responsividade
kernel.sched_autogroup_enabled = 1

# Child runs first: filho executa antes do pai após fork (melhor para shells)
kernel.sched_child_runs_first = 0

# Latência de scheduler (ns): tempo máximo que uma tarefa espera
# Padrão: 6000000 (6ms)
# KanelOS desktop: 4000000 (4ms) — mais responsivo
kernel.sched_latency_ns = 4000000

# Granularidade mínima (ns): tempo mínimo de execução antes de preempção
kernel.sched_min_granularity_ns = 500000

# Wakeup granularity: quanto uma tarefa acordada deve ser favorecida
kernel.sched_wakeup_granularity_ns = 1000000

# Migration cost: custo de migrar tarefa entre CPUs (ns)
kernel.sched_migration_cost_ns = 500000

# --- Rede ---

# Tamanho máximo do backlog de rede
net.core.netdev_max_backlog = 65536

# Tamanho máximo da fila de conexões pendentes
net.core.somaxconn = 65535

# Buffers de recepção e transmissão
net.core.rmem_default = 1048576
net.core.rmem_max = 16777216
net.core.wmem_default = 1048576
net.core.wmem_max = 16777216
net.core.optmem_max = 65536

# TCP buffers
net.ipv4.tcp_rmem = 4096 1048576 16777216
net.ipv4.tcp_wmem = 4096 1048576 16777216

# TCP BBR v3 — melhor controle de congestionamento
net.ipv4.tcp_congestion_control = bbr

# TCP Fast Open (TFO) — reduz latência de conexão
net.ipv4.tcp_fastopen = 3

# TCP timestamps — necessário para BBR
net.ipv4.tcp_timestamps = 1

# TCP SACK — retransmissão seletiva
net.ipv4.tcp_sack = 1

# TCP keepalive
net.ipv4.tcp_keepalive_time = 1200
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5

# TCP syn backlog
net.ipv4.tcp_max_syn_backlog = 65535

# Reutilização de sockets TIME_WAIT
net.ipv4.tcp_tw_reuse = 1

# FIN timeout reduzido
net.ipv4.tcp_fin_timeout = 15

# Janela de congestionamento inicial
# net.ipv4.tcp_init_cwnd NÃO é um sysctl padrão no Linux
# Para configurar: ip route change default initcwnd 10
# O valor padrão já é 10 no Linux 3.0+ (RFC 6928)
# Configurado automaticamente pelo brx-network-setup.sh

# ECN (Explicit Congestion Notification)
net.ipv4.tcp_ecn = 1

# MTU probing
net.ipv4.tcp_mtu_probing = 1

# IPv6
net.ipv6.conf.all.disable_ipv6 = 0
net.ipv6.conf.default.disable_ipv6 = 0

# Netfilter connection tracking
# nf_conntrack_max: requer módulo nf_conntrack carregado
# Usar net.nf_conntrack_max como alias mais portável
net.nf_conntrack_max = 1048576
# Timeout de conexões TCP estabelecidas (segundos)
net.netfilter.nf_conntrack_tcp_timeout_established = 3600

# Fila de scheduling de rede
net.core.default_qdisc = fq

# --- I/O e Armazenamento ---

# Read-ahead: configurado por dispositivo via udev (ver 99-kanelos-hal.rules)
# vm.read_ahead_kb NÃO é um sysctl global válido no Linux
# Para ajustar globalmente, use: /sys/block/*/queue/read_ahead_kb
# O kanel-ai-daemon ajusta dinamicamente por dispositivo
# vm.page-cluster controla o número de páginas lidas em antecipação do swap
vm.page-cluster = 3

# Dirty pages: limite de páginas sujas por dispositivo
# (gerenciado pelo block layer)

# --- Segurança ---

# Proteção contra ataques de symlink/hardlink
fs.protected_symlinks = 1
fs.protected_hardlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2

# Restrição de ptrace (0=sem restrição, 1=apenas pai, 2=apenas root, 3=desabilitado)
kernel.yama.ptrace_scope = 1

# Randomização de endereços (ASLR)
kernel.randomize_va_space = 2

# Restrição de dmesg para usuários não-root
kernel.dmesg_restrict = 1

# Restrição de kptr (ponteiros do kernel em /proc)
kernel.kptr_restrict = 1

# Desabilitar SysRq (produção)
kernel.sysrq = 0

# Panic automático em OOM (0=desabilitado, >0=segundos para reiniciar)
kernel.panic_on_oom = 0
kernel.panic = 0

# --- Performance do Sistema de Arquivos ---

# Inotify: limites para aplicações que monitoram muitos arquivos
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 512
fs.inotify.max_queued_events = 65536

# File handles
fs.file-max = 2097152
fs.nr_open = 1048576

# --- Kernel ---

# Tamanho do pipe (bytes)
fs.pipe-max-size = 1048576

# Semáforos
kernel.sem = 250 32000 100 128

# Mensagens de sistema
kernel.msgmni = 32000
kernel.msgmax = 65536
kernel.msgmnb = 65536

# Memória compartilhada
kernel.shmmax = 68719476736
kernel.shmall = 4294967296

# Printk: reduzir verbosidade em produção
# kernel.printk = 3 4 1 3

# Perf events: permitir acesso a eventos de performance
kernel.perf_event_paranoid = 1
kernel.perf_event_max_sample_rate = 100000

# --- BPF ---

# Permitir BPF sem privilégios (0=desabilitado por segurança)
kernel.unprivileged_bpf_disabled = 1
